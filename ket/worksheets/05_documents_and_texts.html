<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>05 Documents and Texts 文件和文本 默写</title>
<style>
  @page { size: A4; margin: 12mm 14mm; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Helvetica Neue", Arial, "PingFang SC", "Songti SC", sans-serif;
    color: #111;
    font-size: 13px;
    /* 打印时保留背景色，否则四线三格（CSS 背景画的）打不出来 */
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  /* 屏幕预览时模拟 A4 纸张 */
  @media screen {
    body { background: #888; padding: 20px 0; }
    .page {
      width: 210mm; min-height: 297mm; margin: 0 auto 20px;
      background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.4);
      padding: 12mm 14mm;
    }
  }
  @media print {
    .page { page-break-after: always; }
    .page:last-child { page-break-after: auto; }
  }
  .header {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 2px solid #111; padding-bottom: 6px; margin-bottom: 28px;
  }
  .header h1 { font-size: 15px; padding-right: 10px; }
  .header .info { font-size: 12px; white-space: nowrap; }
  .header .info span { margin-left: 10px; }
  .blank { display: inline-block; border-bottom: 1px solid #111; width: 40px; }
  .items {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 30px;
    row-gap: 20px;
  }
  .item {
    display: flex; align-items: center;
    break-inside: avoid;
  }
  .item .no { width: 26px; color: #555; font-size: 12px; flex-shrink: 0; }
  .item .zh { flex-shrink: 0; max-width: 46%; line-height: 1.3; font-size: 14px; }
  .item .pos { color: #888; font-size: 10px; font-style: italic; margin-left: 3px; flex-shrink: 0; }
  /* 四线三格：绿色四线、红色基线（第三条），每格 14px，总高约 11mm */
  .item .line {
    flex: 1; margin-left: 10px; min-width: 60px; height: 43px;
    background-image:
      linear-gradient(#4fae7e, #4fae7e),
      linear-gradient(#4fae7e, #4fae7e),
      linear-gradient(#e04b4b, #e04b4b),
      linear-gradient(#4fae7e, #4fae7e);
    background-size: 100% 1px;
    background-repeat: no-repeat;
    background-position: 0 0, 0 14px, 0 28px, 0 42px;
  }
  .footer { margin-top: 8px; text-align: right; color: #999; font-size: 10px; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>05 Documents and Texts 文件和文本 默写</h1>
    <div class="info">姓名 <span class="blank"></span> 日期 <span class="blank"></span> 得分 <span class="blank"></span></div>
  </div>
  <div class="items">
    <div class="item"><span class="no">1.</span><span class="zh">文章</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">2.</span><span class="zh">卡片</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">3.</span><span class="zh">漫画</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">4.</span><span class="zh">日记</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">5.</span><span class="zh">表格；形式</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">6.</span><span class="zh">信；字母</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">7.</span><span class="zh">执照</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">8.</span><span class="zh">杂志</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">9.</span><span class="zh">消息</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">10.</span><span class="zh">笔记本</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">11.</span><span class="zh">明信片</span><span class="pos">n.</span><span class="line"></span></div>
    <div class="item"><span class="no">12.</span><span class="zh">课本</span><span class="pos">n.</span><span class="line"></span></div>
  </div>
  <div class="footer">共 12 词 · 第 1/1 页</div>
</div>
</body>
</html>
